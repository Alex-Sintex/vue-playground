<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Hola mundo con Vue.js</title>
</head>

<body>
    <div id="app">
        <h1>{{titulo}}</h1>

        <!-- @Keyup.enter to submit form when pressing [ENTER] key -->
        <input type="text" v-model="nuevaFruta" @keyup.enter="agregarFruta">
        <button @click="agregarFruta">Agregar</button>
        
        <ul>
            <li v-for="fruta in frutas">
                <input type="number" v-model.number="fruta.cantidad" @keyup.enter="agregarFruta">
                {{ fruta.nombre }}
                <button @click="fruta.cantidad++">+</button>
                <span v-if="fruta.cantidad === 0"> - Sin Stock</span>
            </li>
        </ul>
        <h4>TOTAL : {{ sumarFrutas }}</h4>

    </div>
    <!-- Development version, includes helpful console warnings -->
    <script src="https://cdn.jsdelivr.net/npm/vue@2.5.16/dist/vue.js"></script>
    <script src="01.js"></script>
</body>

</html>
